<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外太空配對遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a237e 50%, #0d47a1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.1em;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.3em;
            color: #ffeb3b;
            min-width: 60px;
        }

        .timer {
            background: rgba(255, 235, 59, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid #ffeb3b;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .card.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            pointer-events: none;
        }

        .card.matched {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            cursor: default;
            animation: matchAnimation 0.6s ease;
        }

        .card.matched:hover {
            transform: none;
        }

        @keyframes matchAnimation {
            0% {
                transform: scale(1) rotateY(0deg);
            }
            50% {
                transform: scale(1.1) rotateY(180deg);
            }
            100% {
                transform: scale(1) rotateY(360deg);
            }
        }

        .card:disabled {
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .reset-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        .music-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .music-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .music-btn.playing {
            background: linear-gradient(135deg, #ffeb3b 0%, #ffc107 100%);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .modal-content button {
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            margin-top: 20px;
        }

        .difficulty-select {
            text-align: center;
            margin-bottom: 20px;
        }

        .difficulty-select select {
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .container {
                padding: 15px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 外太空配對遊戲 🌌</h1>
        
        <div class="difficulty-select">
            <label for="difficulty">難度：</label>
            <select id="difficulty" onchange="changeDifficulty()">
                <option value="easy">簡單 (4×4)</option>
                <option value="medium" selected>中等 (6×6)</option>
                <option value="hard">困難 (8×8)</option>
            </select>
        </div>

        <div class="stats">
            <div class="stat timer">
                <span>⏱️ 時間：</span>
                <span class="stat-value" id="timer">0:00</span>
            </div>
            <div class="stat">
                <span>💫 找到配對：</span>
                <span class="stat-value"><span id="matched">0</span>/18</span>
            </div>
            <div class="stat">
                <span>📊 嘗試次數：</span>
                <span class="stat-value" id="attempts">0</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="button-group">
            <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 開啟音樂</button>
            <button class="reset-btn" onclick="resetGame()">🔄 重新開始</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 恭喜你！</h2>
            <p>你成功完成了遊戲！</p>
            <p id="finalStats"></p>
            <button onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <!-- 隱藏的音頻元素 -->
    <audio id="bgMusic" loop>
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script>
        // 生成輕鬆的配樂 (使用 Web Audio API)
        class MusicGenerator {
            constructor() {
                this.audioContext = null;
                this.isPlaying = false;
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            play() {
                this.init();
                if (this.isPlaying) return;
                this.isPlaying = true;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                // 輕鬆的旋律
                const melody = [
                    { freq: 262, time: 0, duration: 0.4 },    // C
                    { freq: 330, time: 0.4, duration: 0.4 },  // E
                    { freq: 392, time: 0.8, duration: 0.4 },  // G
                    { freq: 330, time: 1.2, duration: 0.4 },  // E
                    { freq: 262, time: 1.6, duration: 0.8 },  // C
                    { freq: 294, time: 2.4, duration: 0.4 },  // D
                    { freq: 330, time: 2.8, duration: 0.4 },  // E
                    { freq: 392, time: 3.2, duration: 0.8 },  // G
                ];

                melody.forEach(note => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();

                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    osc.frequency.value = note.freq;
                    osc.type = 'sine';

                    gain.gain.setValueAtTime(0.3, now + note.time);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + note.time + note.duration);

                    osc.start(now + note.time);
                    osc.stop(now + note.time + note.duration);
                });

                // 重複播放
                setTimeout(() => {
                    if (this.isPlaying) {
                        this.play();
                    }
                }, 4000);
            }

            stop() {
                this.isPlaying = false;
            }
        }

        const musicGenerator = new MusicGenerator();

        // 外太空相關的表情符號
        const spaceEmojis = [
            '🌑', '🌕', '⭐', '✨', '🌟', '💫',
            '🚀', '🛸', '🛰️', '🌌', '👽', '🪐',
            '☄️', '🌠', '🔭', '🧑‍🚀'
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let attempts = 0;
        let isLocked = false;
        let gameSize = 6;
        let startTime = null;
        let timerInterval = null;
        let musicPlaying = false;

        // 初始化遊戲
        function initGame() {
            matchedPairs = 0;
            attempts = 0;
            flippedCards = [];
            isLocked = false;
            startTime = Date.now();

            // 清除舊的計時器
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);

            // 根據難度調整遊戲大小
            const difficulty = document.getElementById('difficulty').value;
            if (difficulty === 'easy') gameSize = 4;
            else if (difficulty === 'medium') gameSize = 6;
            else gameSize = 8;

            // 建立卡牌陣列
            const pairCount = (gameSize * gameSize) / 2;
            const selectedEmojis = spaceEmojis.slice(0, pairCount);
            cards = [...selectedEmojis, ...selectedEmojis];

            // 洗牌
            shuffleCards();

            // 更新 Grid 列數
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.style.gridTemplateColumns = `repeat(${gameSize}, 1fr)`;

            // 渲染卡牌
            renderCards();

            // 更新統計
            updateStats();
        }

        // 更新計時器
        function updateTimer() {
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // 洗牌函數 (Fisher-Yates)
        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
        }

        // 渲染卡牌
        function renderCards() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            cards.forEach((emoji, index) => {
                const card = document.createElement('button');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.textContent = '?';
                card.onclick = () => flipCard(card);
                gameBoard.appendChild(card);
            });
        }

        // 翻卡牌
        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            card.textContent = card.dataset.emoji;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        // 檢查配對
        function checkMatch() {
            isLocked = true;
            attempts++;

            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                // 配對成功
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;

                flippedCards = [];
                isLocked = false;

                updateStats();

                if (matchedPairs === (gameSize * gameSize) / 2) {
                    showWinModal();
                }
            } else {
                // 配對失敗
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.textContent = '?';
                    card2.textContent = '?';

                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }

            updateStats();
        }

        // 更新統計信息
        function updateStats() {
            document.getElementById('matched').textContent = matchedPairs;
            document.getElementById('attempts').textContent = attempts;
        }

        // 顯示勝利彈窗
        function showWinModal() {
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const time = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            const efficiency = (((gameSize * gameSize) / 2) / attempts * 100).toFixed(1);
            document.getElementById('finalStats').innerHTML = `
                ⏱️ 用時：${time}<br>
                📊 嘗試次數：${attempts}<br>
                ✨ 正確率：${efficiency}%
            `;
            document.getElementById('winModal').classList.add('show');
        }

        // 重新開始遊戲
        function resetGame() {
            document.getElementById('winModal').classList.remove('show');
            initGame();
        }

        // 改變難度
        function changeDifficulty() {
            resetGame();
        }

        // 切換音樂
        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            if (musicPlaying) {
                musicGenerator.stop();
                btn.textContent = '🎵 開啟音樂';
                btn.classList.remove('playing');
                musicPlaying = false;
            } else {
                musicGenerator.play();
                btn.textContent = '🎵 關閉音樂';
                btn.classList.add('playing');
                musicPlaying = true;
            }
        }

        // 初始化
        initGame();
    </script>
</body>
</html>
